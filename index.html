<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesh VJ Layer</title>
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <div id="pose-pip" class="pose-pip" hidden>
        <video id="pose-video" class="pose-video" playsinline muted></video>
        <canvas id="pose-overlay" class="pose-overlay"></canvas>
        <div id="pose-pip-label" class="pose-pip-label">pose: off</div>
      </div>
      <p id="status" class="status">Loading manifest...</p>
      <div id="preloader" class="preloader">
        <div class="preloader-panel">
          <h1 class="preloader-title">Mesh VJ Layer</h1>
          <div class="preloader-label" id="preloader-label">Initializing renderer…</div>
          <div class="preloader-track"><div class="preloader-bar" id="preloader-bar"></div></div>
          <div class="preloader-pct" id="preloader-pct">0%</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
