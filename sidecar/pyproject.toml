[project]
name = "pose-sidecar"
version = "0.1.0"
description = "Native ORT (TensorRT/CUDA/CoreML/CPU) pose inference sidecar for the WebGPU VJ layer"
requires-python = ">=3.10,<3.13"  # onnxruntime/opencv wheels; uv auto-fetches a managed 3.12 if needed
dependencies = [
    "numpy>=1.26",
    "opencv-python-headless>=4.9",
    "websockets>=12",
    # Platform-split: the 4090 box (Linux/Windows) gets onnxruntime-gpu, which
    # carries the CUDA + TensorRT EPs. This Mac dev box gets plain onnxruntime
    # (CPU/CoreML) for protocol smoke-testing — TRT numbers come from the 4090 box.
    "onnxruntime-gpu>=1.18 ; platform_system != 'Darwin'",
    "onnxruntime>=1.18 ; platform_system == 'Darwin'",
]

# CUDA/cuDNN/TensorRT runtime as pip wheels INTO the uv venv (no global install),
# so onnxruntime-gpu finds them via ort.preload_dlls(). Enable with:
#   npm run sidecar:cuda     (= uv run --extra cuda ...)
#
# We install ONLY `tensorrt-cu13`, which transitively pulls a COHERENT CUDA-13 set
# (cudart/cublas/cudnn) with Windows wheels — instead of us pinning each nvidia lib
# (their PyPI naming is wildly inconsistent: cufft wants unsuffixed, cudnn-unsuffixed
# is an ancient Linux-only stub, etc.). This covers the TensorRT EP (--ep trt) and
# the cublas/cudnn that the CUDA EP also needs.
#
# If this still mismatches your onnxruntime-gpu build, the RELIABLE path is a
# system install of CUDA 13.x + cuDNN 9.x + TensorRT on PATH — then plain
# `npm run sidecar` works (preload finds them). See the sidecar's refusal message.
[project.optional-dependencies]
# Explicit nvidia runtime libs matching the DLL versions onnxruntime-gpu (cu13) asks
# for: cublas64_13/cublasLt64_13, cudart64_13, cudnn64_9, cufft64_12. The `-cu13`
# wheels install on Windows EXCEPT cufft (whose `-cu13` is deprecated → unsuffixed).
# tensorrt-cu13 alone does NOT pull these. If this STILL fails on some package's
# Windows wheel, use the system install instead (CUDA 13 + cuDNN 9 + TensorRT on
# PATH) — that's the reliable path; plain `npm run sidecar` then finds them.
cuda = [
    "nvidia-cuda-runtime-cu13 ; platform_system != 'Darwin'",
    "nvidia-cublas-cu13 ; platform_system != 'Darwin'",
    "nvidia-cudnn-cu13 ; platform_system != 'Darwin'",
    "nvidia-curand-cu13 ; platform_system != 'Darwin'",
    "nvidia-cufft ; platform_system != 'Darwin'",
    "tensorrt-cu13 ; platform_system != 'Darwin'",
]

# Managed entirely by uv — `uv run` creates/locks .venv/ here, never touches global.
#   cd sidecar && uv run python pose_sidecar.py          (or: npm run sidecar)
[tool.uv]
package = false
# tensorrt / some nvidia wheels live on NVIDIA's index, not plain PyPI.
extra-index-url = ["https://pypi.nvidia.com"]
